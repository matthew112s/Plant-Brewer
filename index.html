<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Brewer - Herbal Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Arial', sans-serif;
        }
        #game {
            border: 4px solid #2d5016;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000;
            font-family: 'Courier New', monospace;
        }
        .ui-line {
            margin: 5px 0;
        }
        .gold { color: #ffd700; }
        .item { color: #a8e6cf; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="ui-line"><span class="gold">Gold:</span> <span id="gold">500</span></div>
        <div class="ui-line"><span class="item">Location:</span> <span id="location">Garden Shop</span></div>
        <div class="ui-line">Inventory: <span id="inventory-count">0/20</span></div>
        <hr style="border: 1px solid #555; margin: 5px 0;">
        <div class="ui-line" style="font-size: 12px; color: #aaa;">
            <strong>Controls:</strong><br>
            Arrow Keys: Move<br>
            E: Interact<br>
            I: Inventory<br>
            Space: Craft Menu
        </div>
    </div>

    <script src="js/data/recipes.js"></script>
    <script src="js/data/items.js"></script>
    <script src="js/entities/player.js"></script>
    <script src="js/entities/npc.js"></script>
    <script src="js/scenes/boot.js"></script>
    <script src="js/scenes/gardenShop.js"></script>
    <script src="js/scenes/house.js"></script>
    <script src="js/scenes/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
